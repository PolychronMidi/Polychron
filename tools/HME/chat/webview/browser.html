<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HME Chat</title>
<style>
  html { overflow: hidden; }
  :root {
    --bg: #1e1e1e;
    --fg: #d4d4d4;
    --input-bg: #3c3c3c;
    --input-fg: #cccccc;
    --input-border: #555555;
    --btn-bg: #0e639c;
    --btn-fg: #ffffff;
    --btn-hover: #1177bb;
    --border: #454545;
    --user-bg: #252526;
    --assistant-bg: #1e1e1e;
    --thinking-bg: var(--vscode-editorInfo-background, #1a2a3a);
    --thinking-fg: var(--vscode-editorInfo-foreground, #7ec8e3);
    --tool-bg: var(--vscode-editorHint-background, #1a2a1a);
    --tool-fg: var(--vscode-editorHint-foreground, #7ec87e);
    --error-fg: #f48771;
    --route-auto: #56b8da;
    --route-claude: #da7756;
    --route-local: #56da8a;
    --route-hybrid: #7e56da;
    --subtle: #888888;
    --font-mono: monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: system-ui, sans-serif;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /*  Layout  */
  #layout { display: flex; flex: 1; overflow: hidden; }

  /*  Sidebar toggle  */
  #sidebar-toggle-btn {
    background: transparent;
    border: none;
    color: var(--subtle);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 5px;
    border-radius: 3px;
    line-height: 1;
  }
  #sidebar-toggle-btn:hover { color: var(--fg); background: var(--user-bg); }

  /*  Session sidebar  */
  #sidebar {
    width: 200px;
    min-width: 160px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  #sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--subtle);
    flex-shrink: 0;
  }
  #new-session-btn {
    background: var(--btn-bg);
    color: var(--btn-fg);
    border: none;
    border-radius: 3px;
    padding: 2px 7px;
    cursor: pointer;
    font-size: 11px;
  }
  #new-session-btn:hover { background: var(--btn-hover); }
  #sidebar-settings {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .zoom-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 3px;
    width: 20px;
    height: 20px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .zoom-btn:hover { border-color: var(--fg); background: var(--user-bg); }
  #zoom-label { font-size: 10px; color: var(--subtle); min-width: 34px; text-align: center; }
  #session-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding: 4px;
  }
  .session-item {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 6px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    color: var(--fg);
    overflow: hidden;
  }
  .session-item:hover { background: var(--user-bg); }
  .session-item.active { background: var(--user-bg); border-left: 2px solid var(--btn-bg); }
  .session-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session-delete {
    opacity: 0;
    background: transparent;
    border: none;
    color: var(--subtle);
    cursor: pointer;
    font-size: 11px;
    padding: 0 2px;
    flex-shrink: 0;
  }
  .session-item:hover .session-delete { opacity: 1; }
  .session-delete:hover { color: var(--error-fg); }

  /*  Main area  */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /*  Toolbar  */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  #toolbar label { color: var(--subtle); font-size: 11px; }
  #toolbar select, #toolbar input[type="text"] {
    background: var(--input-bg);
    color: var(--input-fg);
    border: 1px solid var(--input-border);
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 12px;
    height: 24px;
  }


  .claude-only, .local-only { transition: opacity 0.15s; }

  #thinking-wrap { display: flex; align-items: center; gap: 4px; }
  #thinking-wrap input[type="checkbox"] { cursor: pointer; }

  #clear-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--subtle);
    border-radius: 3px;
    padding: 2px 8px;
    cursor: pointer;
    font-size: 11px;
  }
  #clear-btn:hover { border-color: var(--fg); color: var(--fg); }

  /*  Messages  */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 100%;
  }
  .msg-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--subtle);
  }
  .route-badge {
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .route-auto   { background: var(--route-auto);   color: #000; }
  .route-claude { background: var(--route-claude); color: #fff; }
  .route-local  { background: var(--route-local);  color: #000; }
  .route-hybrid { background: var(--route-hybrid); color: #fff; }
  .model-badge {
    color: var(--subtle);
    font-size: 10px;
    font-family: var(--font-mono);
  }

  .msg-body {
    padding: 8px 12px;
    border-radius: 6px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .msg-body   { background: var(--user-bg); }
  .msg.assistant .msg-body { background: var(--assistant-bg); border: 1px solid var(--border); }

  /* Thinking accordion */
  details.thinking {
    background: var(--thinking-bg);
    border: 1px solid color-mix(in srgb, var(--thinking-fg) 30%, transparent);
    border-radius: 4px;
    font-size: 11px;
  }
  details.thinking summary {
    padding: 4px 8px;
    cursor: pointer;
    color: var(--thinking-fg);
    user-select: none;
    list-style: none;
  }
  details.thinking summary::-webkit-details-marker { display: none; }
  details.thinking summary::before { content: "▶ "; }
  details.thinking[open] summary::before { content: "▼ "; }
  details.thinking .thinking-body {
    padding: 6px 10px;
    color: var(--thinking-fg);
    font-family: var(--font-mono);
    font-size: 11px;
    opacity: 0.85;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
  }

  /* Tool steps */
  .tool-step {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--tool-fg);
    background: var(--tool-bg);
    padding: 3px 8px;
    border-radius: 3px;
    border-left: 2px solid var(--tool-fg);
    cursor: pointer;
    max-width: 100%;
    box-sizing: border-box;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .tool-step.expanded {
    white-space: pre-wrap;
    word-break: break-word;
    overflow: visible;
    text-overflow: clip;
  }

  .cost-badge {
    color: var(--subtle);
    font-size: 10px;
  }
  .queued-badge {
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    background: #4d4d4d;
    color: #cccccc;
    opacity: 0.7;
  }

  .error-msg {
    color: var(--error-fg);
    font-size: 12px;
    font-family: var(--font-mono);
  }

  /* Standalone error bubble — fail-fast, always visible, never buried */
  .error-bubble {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    border-left: 3px solid var(--error-fg);
    background: color-mix(in srgb, var(--error-fg) 10%, var(--bg));
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--error-fg);
    white-space: pre-wrap;
    word-break: break-word;
    animation: error-flash 0.3s ease-out;
  }
  .error-bubble-icon { flex-shrink: 0; font-size: 14px; }
  .error-bubble-body { flex: 1; }
  .error-bubble-source {
    font-size: 10px;
    opacity: 0.7;
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  @keyframes error-flash {
    from { opacity: 0; transform: translateX(-4px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* CRITICAL error overlay — blocks UI until acknowledged */
  .critical-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: overlay-in 0.2s ease-out;
  }
  .critical-box {
    max-width: 90%;
    padding: 20px 24px;
    border-radius: 10px;
    border: 2px solid var(--error-fg);
    background: var(--bg);
    color: var(--error-fg);
    font-family: var(--font-mono);
    text-align: left;
  }
  .critical-box h2 { margin: 0 0 12px; font-size: 16px; }
  .critical-box pre {
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 12px;
    margin: 8px 0 16px;
    padding: 8px;
    background: rgba(255,0,0,0.08);
    border-radius: 4px;
  }
  .critical-box button {
    padding: 6px 16px;
    border: 1px solid var(--error-fg);
    background: transparent;
    color: var(--error-fg);
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  .critical-box button:hover { background: rgba(255,0,0,0.15); }
  @keyframes overlay-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Streaming cursor — inline span, instantly hidden on done to prevent flash */
  .stream-cursor { animation: blink 0.8s step-end infinite; }
  .stream-cursor.done { animation: none; visibility: hidden; }
  @keyframes blink { 50% { opacity: 0; } }

  /*  Notice bar  */
  #notice-bar {
    display: none;
    padding: 6px 12px;
    font-size: 11px;
    font-family: var(--font-mono);
    white-space: pre-wrap;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
  }
  #notice-bar.warn  { background: color-mix(in srgb, #b8860b 15%, transparent); color: #e0c060; border-left: 3px solid #b8860b; }
  #notice-bar.block { background: color-mix(in srgb, var(--error-fg) 15%, transparent); color: var(--error-fg); border-left: 3px solid var(--error-fg); }
  #notice-bar.audit { background: color-mix(in srgb, var(--route-hybrid) 12%, transparent); color: var(--route-hybrid); border-left: 3px solid var(--route-hybrid); }
  #notice-bar.info  { background: color-mix(in srgb, var(--btn-bg) 12%, transparent); color: var(--btn-fg); border-left: 3px solid var(--btn-bg); }

  /*  Input area  */
  #input-area {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px 10px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #msg-input {
    background: var(--input-bg);
    color: var(--input-fg);
    border: 1px solid var(--input-border);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
    resize: none;
    min-height: 60px;
    max-height: 200px;
    outline: none;
  }
  #msg-input:focus { border-color: var(--btn-bg); }
  #enrich-row {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  #enrich-btn {
    background: var(--btn-bg);
    color: var(--btn-fg);
    border: none;
    border-radius: 4px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 12px;
  }
  #enrich-btn:hover { background: var(--btn-hover); }
  #enrich-btn:disabled { opacity: 0.5; cursor: default; }
  #frame-toggle-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--subtle);
    border-radius: 3px;
    padding: 3px 8px;
    cursor: pointer;
    font-size: 11px;
  }
  #frame-toggle-btn:hover { border-color: var(--fg); color: var(--fg); }
  #restore-btn, #reject-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 3px;
    padding: 3px 8px;
    cursor: pointer;
    font-size: 11px;
  }
  #restore-btn:hover { border-color: var(--error-fg); color: var(--error-fg); }
  #reject-btn:hover { border-color: var(--btn-bg); color: var(--btn-bg); }
  #enrich-status {
    font-size: 11px;
    color: var(--subtle);
  }
  #frame-input {
    background: var(--input-bg);
    color: var(--input-fg);
    border: 1px solid var(--input-border);
    border-radius: 4px;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 12px;
    min-height: 32px;
    max-height: 80px;
    resize: none;
    width: 100%;
    box-sizing: border-box;
  }
  #input-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  #send-btn {
    background: var(--btn-bg);
    color: var(--btn-fg);
    border: none;
    border-radius: 4px;
    padding: 6px 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  #send-btn:hover { background: var(--btn-hover); }
  #send-btn:disabled { opacity: 0.5; cursor: default; }
  #context-meter {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--subtle);
    font-family: var(--font-mono);
    cursor: default;
    user-select: none;
  }
  #context-meter-bar {
    width: 40px;
    height: 8px;
    background: color-mix(in srgb, var(--fg) 15%, transparent);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  #context-meter-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease, background 0.4s ease;
    width: 0%;
    background: var(--route-auto);
  }
  #context-meter.warn #context-meter-fill { background: #daa520; }
  #context-meter.critical #context-meter-fill { background: var(--error-fg); }
  #context-chain-badge {
    font-size: 10px;
    color: var(--route-hybrid);
    margin-left: 2px;
  }
  #stop-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 4px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12px;
    display: none;
  }
  #stop-btn:hover { border-color: var(--error-fg); color: var(--error-fg); }
  #queue-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 4px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12px;
    display: none;
  }
  #queue-btn:hover { border-color: var(--btn-bg); color: var(--btn-bg); }
  #status-line {
    font-size: 11px;
    color: var(--subtle);
    align-self: center;
    margin-left: auto;
  }
</style>
</head>
<body>

<div id="layout">
<!-- Session sidebar -->
<div id="sidebar" style="display:none">
  <div id="sidebar-header">
    <span>Sessions</span>
    <button id="new-session-btn" title="New session">+</button>
  </div>
  <div id="sidebar-settings">
    <button class="zoom-btn" id="zoom-out-btn" title="Zoom out">−</button>
    <span id="zoom-label">100%</span>
    <button class="zoom-btn" id="zoom-in-btn" title="Zoom in">+</button>
  </div>
  <div id="session-list"></div>
</div>

<!-- Main -->
<div id="main">
<!-- Toolbar -->
<div id="toolbar">
  <button id="sidebar-toggle-btn" title="Toggle session sidebar">⚙</button>

  <!-- Model + effort controls (claude route always active) -->
  <select id="claude-model">
    <option value="opus">Opus</option>
    <option value="sonnet" selected>Sonnet</option>
    <option value="haiku">Haiku</option>
  </select>
  <select id="claude-effort">
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high" selected>High</option>
  </select>
  <div id="thinking-wrap">
    <input type="checkbox" id="thinking-toggle" />
    <label for="thinking-toggle">Thinking</label>
  </div>
  <span id="config-pill" title="Claude config sync status" style="font-size:10px;padding:1px 6px;border-radius:3px;background:#555;color:#eee;margin-left:4px;">…</span>

  <button id="mirror-btn" title="Toggle terminal mirror — show Claude PTY in a visible terminal panel" style="font-size:10px;padding:2px 6px;">BG</button>
  <span id="shim-status" title="HME KB shim status" style="font-size:10px;color:var(--subtle);margin-left:4px;">HME ○</span>
  <span id="arbiter-status" title="Auto-routing arbiter daemon health — fills when 3+ consecutive classify calls fail" style="font-size:10px;color:var(--subtle);margin-left:4px;">ARB ○</span>
  <button id="clear-btn">Clear</button>
</div>

<!-- Messages -->
<div id="messages"></div>

<!-- Notice bar -->
<div id="notice-bar" title="Click to dismiss"></div>

<!-- Input -->
<div id="input-area">
  <textarea id="msg-input" placeholder="Message… (Enter to send, Shift+Enter for newline)"></textarea>
  <div id="enrich-row">
    <button id="enrich-btn" title="Enrich prompt with KB, structure, and session context (local models, zero tokens)">Enrich</button>
    <button id="frame-toggle-btn" title="Add optional framing for how to enrich">Frame</button>
    <button id="restore-btn" style="display:none;" title="Restore original prompt">Restore</button>
    <button id="reject-btn" style="display:none;" title="Reject and re-enrich with updated framing">Reject</button>
    <span id="enrich-status"></span>
  </div>
  <textarea id="frame-input" placeholder="How to enrich… (e.g. 'focus on coupling dimensions')" style="display:none;"></textarea>
  <div id="input-row">
    <button id="send-btn">Send</button>
    <div id="context-meter" title="Context window usage">
      <div id="context-meter-bar"><div id="context-meter-fill"></div></div>
      <span id="context-meter-pct">0%</span>
      <span id="context-chain-badge"></span>
      <span id="cli-model-label" style="margin-left:6px;font-size:10px;opacity:0.6;"></span>
    </div>
    <button id="stop-btn">Stop</button>
    <button id="queue-btn">Queue</button>
    <button id="drain-btn" style="display:none;">Drain queue</button>
    <span id="status-line"></span>
  </div>
</div>

</div><!-- /main -->
</div><!-- /layout -->

<script>
// Browser polyfill: replaces acquireVsCodeApi()
const _lsKey = 'hme_vscode_state';
var _sseReady = false;
var _sseQueue = [];
function _flushSseQueue() {
  var q = _sseQueue.splice(0);
  for (var i = 0; i < q.length; i++) _sendToServer(q[i]);
}
function _sendToServer(msg, attempt) {
  attempt = attempt || 1;
  fetch('/api/message', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(msg) })
    .then(function(r) {
      if (!r.ok && attempt < 3) {
        // 4xx/5xx: retry with backoff. Without this, a single transient
        // server hiccup silently lost the user's send.
        setTimeout(function() { _sendToServer(msg, attempt + 1); }, attempt * 500);
      }
    })
    .catch(function(e) {
      console.error('[HME] postMessage attempt ' + attempt + ' failed:', e);
      if (attempt < 3) {
        setTimeout(function() { _sendToServer(msg, attempt + 1); }, attempt * 500);
      } else {
        console.error('[HME] postMessage gave up after 3 attempts; message LOST:', msg && msg.type);
      }
    });
}
const vscode = {
  postMessage(msg) {
    if (_sseReady) { _sendToServer(msg); } else { _sseQueue.push(msg); }
  },
  getState() { return JSON.parse(localStorage.getItem(_lsKey) || 'null'); },
  setState(s) { localStorage.setItem(_lsKey, JSON.stringify(s)); },
};

//  State
let streaming = false;
const activeStreams = new Set();   // supports parallel streams (agent mode)
let streamTools = [];
const streamBodyMap = new Map();      // per-stream active text block
const streamThinkingMap = new Map();  // per-stream active thinking block

//  UI refs
const claudeModel = document.getElementById('claude-model');
const claudeEffort= document.getElementById('claude-effort');
const thinkingChk = document.getElementById('thinking-toggle');
const configPill  = document.getElementById('config-pill');

function renderConfigPill() {
  if (!configPill) return;
  if (_configPending) {
    configPill.textContent = 'syncing…';
    configPill.style.background = '#7a6a00'; // amber
    configPill.title = 'Sending config to server';
    return;
  }
  if (!_configLastApplied) {
    configPill.textContent = '…';
    configPill.style.background = '#555';
    configPill.title = 'No config confirmed yet';
    return;
  }
  var a = _configLastApplied;
  var uiModel = claudeModel.value;
  var uiEffort = claudeEffort ? claudeEffort.value : 'medium';
  var uiThinking = thinkingChk ? thinkingChk.checked : false;
  var drift = (a.alias !== uiModel)
    || (a.alias !== 'haiku' && a.effort !== uiEffort)
    || (a.alias !== 'haiku' && a.thinking !== uiThinking);
  if (drift) {
    configPill.textContent = 'drift';
    configPill.style.background = '#a63a2a';
    configPill.title = 'UI differs from server. Server: ' + a.alias + '/' + a.effort + (a.thinking ? '/think' : '');
  } else {
    configPill.textContent = '\u2713 ' + a.alias + '/' + a.effort + (a.thinking ? '/think' : '');
    configPill.style.background = '#2a6a2a';
    configPill.title = 'Server confirmed: ' + a.modelId + ' effort=' + a.effort + ' thinking=' + a.thinking;
  }
}

// Update effort/thinking visibility when model changes:

//  Send
function send() {
  let text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '';
  vscode.setState(Object.assign({}, vscode.getState() || {}, { inputDraft: '' }));
  // Default route is claude. Slash prefixes override for backend testing:
  // /local, /hybrid, /auto, /agent — e.g. "/local what is X?"
  let route = 'claude';
  var routeMatch = text.match(new RegExp('^/(local|hybrid|auto|agent) '));
  if (routeMatch) {
    route = routeMatch[1];
    text = text.slice(routeMatch[0].length).trim();
  }
  const isClaude = route === 'claude';
  vscode.postMessage({
    type: 'send',
    text,
    route,
    claudeModel: claudeModel.value,
    claudeEffort: isClaude ? claudeEffort.value : undefined,
    claudeThinking: isClaude ? thinkingChk.checked : false,
    llamacppModel: 'qwen3-coder:30b',
  });
  // Show stop/queue immediately — don't wait for streamStart which may be delayed
  // by arbiter classification (up to 60s on auto route).
  streaming = true;
  stopBtn.style.display = 'inline-block';
  queueBtn.style.display = 'inline-block';
  setStatus('Sending…');
}

//  Receive messages from extension
// SSE event stream from server — dispatches synthetic message events into the page
(function() {
  function connectSSE() {
    var evtSrc = new EventSource('/api/events');
    evtSrc.onopen = function() {
      _sseReady = true;
      _flushSseQueue();
    };
    evtSrc.onmessage = function(e) {
      var msg = JSON.parse(e.data);
      window.dispatchEvent(new MessageEvent('message', { data: msg }));
    };
    evtSrc.onerror = function(err) {
      console.error('[HME] SSE error, reconnecting in 2s:', err);
      _sseReady = false;
      evtSrc.close();
      setTimeout(connectSSE, 2000);
    };
  }
  connectSSE();
})();

window.addEventListener('message', (event) => {
  const msg = event.data;
  switch (msg.type) {
    case 'message':
      appendMessage(msg.message);
      break;
    case 'streamStart':
      startStream(msg.id, msg.route, msg.model);
      break;
    case 'streamChunk':
      appendChunk(msg.id, msg.chunkType, msg.chunk);
      break;
    case 'errorBubble':
      // Suppressed in UI — errors now flow to hme-errors.log via ErrorSink,
      // which LIFESAVER surfaces to the agent at next turn. Keeping the
      // UI path would spam the user with diagnostics they can't act on.
      // criticalError path below still shows an overlay for hard failures
      // the user genuinely needs to see right now.
      break;
    case 'criticalError':
      showCriticalOverlay(msg.source, msg.message);
      break;
    case 'streamEnd':
      endStream(msg.id, msg.cost);
      break;
    case 'cancelConfirmed':
      [...activeStreams].forEach(sid => endStream(sid, undefined));
      break;
    case 'messageRemoved':
      // Drop the DOM node for a cancelled partial assistant message so the
      // conversation doesn't show a half-written orphan. appendMessage uses
      // id="msg-${msg.id}" for the outer div.
      if (msg.id) {
        var el = document.getElementById('msg-' + msg.id);
        if (el && el.parentNode) el.parentNode.removeChild(el);
      }
      break;
    case 'contextMeterStuck':
      setStatus('⚠ Context meter offline — ' + (msg.reason || 'usedPct not arriving') + ' (last good: ' + (msg.lastGoodPct || 0) + '%)');
      break;
    case 'contextMeterRestored':
      setStatus('');
      break;
    case 'queueStatus':
      if (msg.pending > 0) {
        setStatus('Queue: ' + msg.pending + '/' + msg.limit);
      }
      break;
    case 'queueAlert':
      setStatus('⚠ Queue ' + msg.pending + '/' + msg.limit + ' — ' + (msg.reason || 'stream stuck') + '.');
      drainBtn.style.display = 'inline-block';
      break;
    case 'streamingRestored':
      // Panel was reshown during an active stream — restore stop/queue visibility
      streaming = true;
      stopBtn.style.display = 'inline-block';
      queueBtn.style.display = 'inline-block';
      setStatus('Streaming…');
      break;
    case 'enrichStatus':
      enrichBtn.disabled = true;
      enrichStatus.textContent = 'Enriching\u2026';
      break;
    case 'enrichResult':
      enrichBtn.disabled = false;
      if (msg.unchanged || msg.error) {
        enrichStatus.textContent = msg.error ? 'Enrichment failed' : (msg.reason || 'No enrichment needed');
        restoreBtn.style.display = 'none';
        rejectBtn.style.display = 'none';
      } else {
        input.value = msg.enriched;
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 200) + 'px';
        vscode.setState(Object.assign({}, vscode.getState() || {}, { inputDraft: msg.enriched }));
        _enrichOriginal = msg.original;
        var modes = [];
        if (msg.triage) {
          if (msg.triage.kb) modes.push('KB');
          if (msg.triage.structural) modes.push('structure');
          if (msg.triage.contextual) modes.push('context');
        }
        var t = msg.trace || {};
        enrichStatus.textContent = modes.join('+') + ' (' + ((t.triage_ms||0) + (t.assembly_ms||0) + (t.enrich_ms||0) + (t.compress_ms||0)) + 'ms)';
        restoreBtn.style.display = 'inline-block';
        rejectBtn.style.display = 'inline-block';
      }
      break;
    case 'historyCleared':
      // Handled by session message listener below (also clears session state)
      updateContextMeter(0, 0, 0);
      break;
    case 'contextUpdate':
      updateContextMeter(msg.pct, msg.chainLinks, msg.chainIndex, msg.cliModel);
      break;
    case 'chainCompleted':
      updateContextMeter(0, msg.linkIndex + 1, msg.chainIndex);
      break;
    case 'claudeConfigApplied':
      _configPending = false;
      _configLastApplied = {
        alias: msg.alias, modelId: msg.modelId, effort: msg.effort, thinking: msg.thinking,
      };
      renderConfigPill();
      if (msg.rejected) setStatus('Config rejected — reverted to server state');
      break;
    case 'claudeConfigDispatched':
      // Server is about to invoke claude CLI with these args — show it.
      setStatus('Dispatched ' + msg.modelId + ' effort=' + msg.effort + (msg.thinking ? ' thinking=on' : ''));
      break;
    case 'claudeConfigConfirmed':
      // Response came back with matching model id.
      if (configPill) {
        configPill.style.background = '#2a6a2a';
        configPill.title = 'Validated via response: ' + msg.modelId
          + (msg.thinkingEmitted ? ' (thinking blocks observed)' : '');
      }
      break;
    case 'claudeConfigMismatch':
      if (configPill) {
        configPill.textContent = 'MISMATCH';
        configPill.style.background = '#a63a2a';
        configPill.title = 'Requested ' + msg.requested + ' but Claude returned ' + msg.actual;
      }
      break;
  }
});

//  Scroll helpers
function isNearBottom() {
  return messages.scrollHeight - messages.scrollTop - messages.clientHeight < 80;
}
function scrollToBottom() {
  if (isNearBottom()) messages.scrollTop = messages.scrollHeight;
}
function forceScrollToBottom() {
  messages.scrollTop = messages.scrollHeight;
}

//  Tool step factory
function makeToolStep(text) {
  const div = document.createElement('div');
  div.className = 'tool-step';
  div.textContent = text;
  div.addEventListener('click', function() { this.classList.toggle('expanded'); });
  return div;
}

//  Message rendering
function appendMessage(msg) {
  const div = document.createElement('div');
  div.className = `msg ${msg.role}`;
  div.id = `msg-${msg.id}`;

  const header = document.createElement('div');
  header.className = 'msg-header';
  const roleLabel = msg.role === 'user' ? 'You' : 'Assistant';
  header.innerHTML = `<span>${roleLabel}</span>`;
  if (msg.route) {
    header.innerHTML += `<span class="route-badge route-${msg.route}">${msg.route}</span>`;
  }
  if (streaming && msg.role === 'user') {
    header.innerHTML += `<span class="queued-badge">queued</span>`;
  }

  div.appendChild(header);

  if (msg.blocks && msg.blocks.length) {
    for (const block of msg.blocks) {
      if (block.type === 'thinking') {
        const details = document.createElement('details');
        details.className = 'thinking';
        details.innerHTML = `<summary>🧠 Thinking</summary><div class="thinking-body"></div>`;
        details.querySelector('.thinking-body').textContent = block.content;
        div.appendChild(details);
      } else if (block.type === 'tool') {
        div.appendChild(makeToolStep(block.content));
      } else {
        const body = document.createElement('div');
        body.className = 'msg-body';
        body.textContent = block.content;
        div.appendChild(body);
      }
    }
  } else {
    if (msg.thinking) {
      const details = document.createElement('details');
      details.className = 'thinking';
      details.innerHTML = `<summary>🧠 Thinking</summary><div class="thinking-body"></div>`;
      details.querySelector('.thinking-body').textContent = msg.thinking;
      div.appendChild(details);
    }

    if (msg.text) {
      const body = document.createElement('div');
      body.className = 'msg-body';
      body.textContent = msg.text;
      div.appendChild(body);
    }

    if (msg.tools && msg.tools.length) {
      for (const t of msg.tools) {
        div.appendChild(makeToolStep(t));
      }
    }
  }

  messages.appendChild(div);
  _cacheMessage(msg);
  _enforceMessageDomCap();
  scrollToBottom();
}

// Scroll-restore: remember where the user was looking when a session was
// last displayed, so re-loading the same session doesn't bounce them to
// the bottom. Keyed by the id of the last-focused message (nearest to
// the top of the viewport at scroll time).
const _savedScrollByMsgId = {};
let _lastFocusedMsgId = '';
let _scrollSaveTimer = null;
function _recordScrollPosition() {
  if (_scrollSaveTimer) { clearTimeout(_scrollSaveTimer); _scrollSaveTimer = null; }
  // Debounce so every scroll wheel tick doesn't write.
  _scrollSaveTimer = setTimeout(() => {
    const top = messages.scrollTop;
    // Find the first message whose top edge is below the current scroll
    // position — that's the "last focused" reference.
    for (const el of messages.children) {
      if (el.id && el.id.startsWith('msg-')) {
        if (el.offsetTop >= top) {
          _lastFocusedMsgId = el.id;
          _savedScrollByMsgId[_lastFocusedMsgId] = top;
          break;
        }
      }
    }
  }, 300);
}

// Virtualization: keep at most MESSAGES_DOM_CAP nodes live, but stash
// the pruned message *payloads* in a JS array so the user can scroll
// back and restore them into the DOM on demand. The alternative (true
// windowing with a synthetic scroll surface) is complex and has edge
// cases around variable message heights; this simpler approach — a
// "Load older" control at the top — gives the user the same practical
// capability with a fraction of the code.
const MESSAGES_DOM_CAP = 400;
const _prunedMessages = [];  // array of message objects in chronological order
let _pruneBanner = null;
// When true, _enforceMessageDomCap is a no-op — set during _restoreOlderMessages
// so the cap enforcer doesn't immediately re-prune what we just loaded.
let _restoring = false;
function _enforceMessageDomCap() {
  if (_restoring) return;
  const overflow = messages.children.length - MESSAGES_DOM_CAP;
  if (overflow <= 0) return;
  let removed = 0;
  let idx = 0;
  if (messages.children.length && messages.children[0].classList.contains('prune-banner')) {
    idx = 1;
  }
  while (idx < messages.children.length && removed < overflow) {
    const child = messages.children[idx];
    const childId = child.id || '';
    const streamId = childId.startsWith('msg-') ? childId.slice(4) : '';
    if (streamId && activeStreams.has(streamId)) {
      idx++;
      continue;
    }
    // Stash the message payload before dropping the DOM node. Pull from
    // the original object cache keyed by id if available; otherwise
    // reconstruct a minimal record from the DOM (best-effort).
    const cached = _messageCache[streamId];
    if (cached) _prunedMessages.push(cached);
    child.remove();
    removed++;
  }
  if (removed > 0) {
    _updatePruneBanner();
    console.log('[HME] DOM cap: pruned ' + removed + ' messages; ' + _prunedMessages.length + ' stashed (live cap=' + MESSAGES_DOM_CAP + ')');
  }
}
// Keep a lightweight cache of all messages ever rendered so pruned ones
// can be restored without a server round-trip. Cleared on session load.
const _messageCache = {};
function _cacheMessage(msg) {
  if (msg && msg.id) _messageCache[msg.id] = msg;
}
function _updatePruneBanner() {
  if (_prunedMessages.length === 0) {
    if (_pruneBanner) { _pruneBanner.remove(); _pruneBanner = null; }
    return;
  }
  if (!_pruneBanner) {
    _pruneBanner = document.createElement('div');
    _pruneBanner.className = 'prune-banner';
    _pruneBanner.style.cssText = 'padding:6px 10px;background:var(--panel-bg,#2a2a2a);color:var(--muted-fg,#999);font-size:11px;text-align:center;border-bottom:1px solid var(--btn-bg,#444);cursor:pointer;user-select:none;';
    _pruneBanner.addEventListener('click', _restoreOlderMessages);
    messages.insertBefore(_pruneBanner, messages.firstChild);
  }
  _pruneBanner.textContent =
    _prunedMessages.length + ' older message(s) pruned — click to load more (oldest first)';
}
let _restoring = false;
function _restoreOlderMessages() {
  if (_prunedMessages.length === 0) return;
  // Restore in batches of 50 — walking most-recently-pruned first, then
  // reversing their order so chronological flow is preserved. Reuse
  // appendMessage for full fidelity (thinking/tools/blocks/cost), then
  // reparent each node to the top so it lands above the live tail.
  const batch = _prunedMessages.splice(-50).reverse();
  // Freeze the DOM cap while we restore — otherwise _enforceMessageDomCap
  // inside appendMessage would immediately re-prune what we just restored.
  _restoring = true;
  try {
    for (const m of batch) {
      appendMessage(m);
      const node = document.getElementById('msg-' + m.id);
      if (node && node.parentNode === messages) {
        const anchor = _pruneBanner && _pruneBanner.parentNode === messages
          ? _pruneBanner.nextSibling
          : messages.firstChild;
        messages.insertBefore(node, anchor);
      }
    }
  } finally {
    _restoring = false;
  }
  _updatePruneBanner();
}
function _resetPruneBanner() {
  _prunedMessages.length = 0;
  for (const k in _messageCache) delete _messageCache[k];
  if (_pruneBanner) { _pruneBanner.remove(); _pruneBanner = null; }
}

function startStream(id, route, model) {
  streaming = true;
  activeStreams.add(id);
  streamTools = [];

  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = `msg-${id}`;

  const header = document.createElement('div');
  header.className = 'msg-header';
  header.innerHTML = `<span>Assistant</span><span class="route-badge route-${route}">${route}</span><span class="model-badge">${model}</span>`;

  div.appendChild(header);
  messages.appendChild(div);

  stopBtn.style.display = 'inline-block';
  queueBtn.style.display = 'inline-block';
  setStatus('Streaming…');
  forceScrollToBottom();
}

function appendChunk(id, chunkType, chunk) {
  const div = document.getElementById(`msg-${id}`);
  if (!div) return;
  // Check scroll position BEFORE DOM mutation — large thinking blocks can grow
  // scrollHeight by more than the 80px threshold in a single chunk, making the
  // post-mutation isNearBottom() check incorrectly conclude the user scrolled up.
  const wasAtBottom = isNearBottom();

  if (chunkType === 'thinking') {
    // Each thinking segment gets its own block per stream; nulled by text/tool chunks
    if (!streamThinkingMap.get(id)) {
      const thk = document.createElement('details');
      thk.className = 'thinking';
      thk.open = true;
      thk.innerHTML = `<summary>🧠 Thinking…</summary><div class="thinking-body"></div>`;
      div.appendChild(thk);
      streamThinkingMap.set(id, thk);
    }
    streamThinkingMap.get(id).querySelector('.thinking-body').textContent += chunk;
  } else if (chunkType === 'tool') {
    // Hide cursor in current text block for this stream
    streamBodyMap.get(id)?.querySelector('.stream-cursor')?.classList.add('done');
    streamBodyMap.delete(id);
    streamThinkingMap.delete(id);
    div.appendChild(makeToolStep(chunk));
  } else if (chunkType === 'error') {
    const errDiv = document.createElement('div');
    errDiv.className = 'error-msg';
    errDiv.textContent = '⚠ ' + chunk;
    div.appendChild(errDiv);
  } else {
    streamThinkingMap.delete(id); // entering text mode — close current thinking segment
    // text — one block per inter-tool segment per stream
    if (!streamBodyMap.get(id)) {
      const body = document.createElement('div');
      body.className = 'msg-body';
      const cur = document.createElement('span');
      cur.className = 'stream-cursor';
      cur.textContent = '▊';
      body.appendChild(cur);
      div.appendChild(body);
      streamBodyMap.set(id, body);
    }
    const body = streamBodyMap.get(id);
    const cur = body.querySelector('.stream-cursor');
    body.insertBefore(document.createTextNode(chunk), cur);
  }
  if (wasAtBottom) messages.scrollTop = messages.scrollHeight;
}

function endStream(id, cost) {
  activeStreams.delete(id);
  streaming = activeStreams.size > 0;
  streamBodyMap.delete(id);
  streamThinkingMap.delete(id);
  if (!streaming) { stopBtn.style.display = 'none'; queueBtn.style.display = 'none'; }

  const div = document.getElementById(`msg-${id}`);
  if (div) {
    div.querySelectorAll('.stream-cursor').forEach(c => {
      c.classList.add('done'); // hide immediately — stops animation in same paint
      requestAnimationFrame(() => c.remove());
    });

    // Update all thinking block summaries (may be multiple interspersed blocks)
    div.querySelectorAll('details.thinking summary').forEach(s => { s.textContent = '🧠 Thinking'; });

    if (cost !== undefined && cost !== null) {
      const header = div.querySelector('.msg-header');
      if (header) header.innerHTML += `<span class="cost-badge">$${cost.toFixed(4)}</span>`;
    }
  }

  if (!streaming) setStatus(cost !== undefined ? `Cost: $${cost?.toFixed(4) ?? '?'}` : '');
}

function appendErrorBubble(source, message) {
  const wrap = document.createElement('div');
  wrap.className = 'error-bubble';

  const icon = document.createElement('span');
  icon.className = 'error-bubble-icon';
  icon.textContent = '⚠';

  const body = document.createElement('div');
  body.className = 'error-bubble-body';

  const src = document.createElement('div');
  src.className = 'error-bubble-source';
  src.textContent = source;

  const text = document.createElement('div');
  text.textContent = message;

  body.appendChild(src);
  body.appendChild(text);
  wrap.appendChild(icon);
  wrap.appendChild(body);
  messages.appendChild(wrap);
  scrollToBottom();
}

function showCriticalOverlay(source, message) {
  // Remove any existing overlay first
  document.querySelectorAll('.critical-overlay').forEach(el => el.remove());
  const overlay = document.createElement('div');
  overlay.className = 'critical-overlay';
  overlay.innerHTML = '<div class="critical-box">'
    + '<h2>CRITICAL ERROR</h2>'
    + '<pre></pre>'
    + '<button>Acknowledge</button>'
    + '</div>';
  overlay.querySelector('pre').textContent = '[' + source + '] ' + message;
  overlay.querySelector('button').addEventListener('click', () => overlay.remove());
  document.body.appendChild(overlay);
  setStatus('CRITICAL ERROR: ' + source);
}

function setStatus(text) {
  statusLine.textContent = text;
}

//  Context meter
const ctxMeter = document.getElementById('context-meter');
const ctxFill = document.getElementById('context-meter-fill');
const ctxPctLabel = document.getElementById('context-meter-pct');
const ctxChainBadge = document.getElementById('context-chain-badge');
const cliModelLabel = document.getElementById('cli-model-label');

function updateContextMeter(pct, chainLinks, chainIndex, cliModel) {
  if (!ctxFill || !ctxPctLabel || !ctxMeter) return;
  const clamped = Math.max(0, Math.min(99, pct));
  ctxFill.style.width = clamped + '%';
  ctxPctLabel.textContent = clamped + '%';
  ctxMeter.classList.remove('warn', 'critical');
  if (clamped >= 99) ctxMeter.classList.add('critical');
  else if (clamped >= 95) ctxMeter.classList.add('warn');
  ctxMeter.title = 'Context: ' + clamped + '% used' + (chainLinks > 0 ? ' | ' + chainLinks + ' chain link' + (chainLinks > 1 ? 's' : '') : '') + (cliModel ? ' | CLI: ' + cliModel : '');
  if (ctxChainBadge) {
    ctxChainBadge.textContent = chainLinks > 0 ? '\u26D3' + chainLinks : '';
  }
  if (cliModelLabel && cliModel) {
    cliModelLabel.textContent = cliModel;
  }
}

//  Notice bar
const noticeBar = document.getElementById('notice-bar');
noticeBar?.addEventListener('click', () => {
  if (noticeBar) { noticeBar.style.display = 'none'; noticeBar.textContent = ''; }
});
window.addEventListener('message', (event) => {
  const msg = event.data;
  if (msg.type === 'notice' && noticeBar) {
    noticeBar.className = msg.level || 'warn';
    noticeBar.textContent = msg.text;
    noticeBar.style.display = 'block';
  }
}, true);

//  Sidebar toggle
var sidebar = document.getElementById('sidebar');
var sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
var _uiState = vscode.getState() || {};
var sidebarVisible = _uiState.sidebarVisible === true;  // hidden unless explicitly true
function applySidebar() {
  if (sidebar) sidebar.style.display = sidebarVisible ? 'flex' : 'none';
  if (sidebarToggleBtn) sidebarToggleBtn.style.color = sidebarVisible ? 'var(--subtle)' : 'var(--btn-fg)';
}
if (sidebarToggleBtn) {
  sidebarToggleBtn.addEventListener('click', function() {
    sidebarVisible = !sidebarVisible;
    applySidebar();
    vscode.setState(Object.assign({}, vscode.getState() || {}, { sidebarVisible: sidebarVisible }));
  });
}
applySidebar();

//  Restore persisted model/effort selection
if (claudeModel && _uiState.claudeModel) {
  claudeModel.value = _uiState.claudeModel;
}
// updateModelControls FIRST — adds the "max" option for Opus before we try to
// set effort to "max". Setting a select value to a missing option silently falls
// back to the first option ("low"), so order matters here.
updateModelControls();
if (claudeEffort && _uiState.claudeEffort) {
  claudeEffort.value = _uiState.claudeEffort;
}

//  Restore persisted thinking state
if (thinkingChk && typeof _uiState.thinkingEnabled === 'boolean') {
  thinkingChk.checked = _uiState.thinkingEnabled;
}
if (thinkingChk) {
  thinkingChk.addEventListener('change', function() {
    vscode.setState(Object.assign({}, vscode.getState() || {}, { thinkingEnabled: thinkingChk.checked }));
    sendClaudeConfig();
  });
}
// Send initial config on page load once SSE is ready (so server knows what the
// restored UI selections are).
(function waitSseThenSend() {
  if (_sseReady) { sendClaudeConfig(); return; }
  setTimeout(waitSseThenSend, 100);
})();

//  Restore persisted textarea draft
if (input && _uiState.inputDraft) {
  input.value = _uiState.inputDraft;
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
}

//  Zoom controls
var _defaultZoom = (typeof window.__HME_ZOOM__ === 'number') ? window.__HME_ZOOM__ : 1.0;
var zoomLevel = (typeof _uiState.zoomLevel === 'number') ? _uiState.zoomLevel : _defaultZoom;
var ZOOM_STEP = 0.1, ZOOM_MIN = 0.6, ZOOM_MAX = 1.8;
var zoomLabel = document.getElementById('zoom-label');
var zoomInBtn = document.getElementById('zoom-in-btn');
var zoomOutBtn = document.getElementById('zoom-out-btn');
function applyZoom() {
  if (zoomLevel === 1.0) {
    document.body.style.zoom = '';
    document.body.style.height = '';
  } else {
    document.body.style.zoom = String(zoomLevel);
    document.body.style.height = (100 / zoomLevel).toFixed(3) + 'vh';
  }
  if (zoomLabel) zoomLabel.textContent = Math.round(zoomLevel * 100) + '%';
}
if (zoomInBtn) {
  zoomInBtn.addEventListener('click', function() {
    zoomLevel = Math.min(ZOOM_MAX, Math.round((zoomLevel + ZOOM_STEP) * 10) / 10);
    applyZoom();
    vscode.setState(Object.assign({}, vscode.getState() || {}, { zoomLevel: zoomLevel }));
    vscode.postMessage({ type: 'setZoomLevel', level: zoomLevel });
  });
}
if (zoomOutBtn) {
  zoomOutBtn.addEventListener('click', function() {
    zoomLevel = Math.max(ZOOM_MIN, Math.round((zoomLevel - ZOOM_STEP) * 10) / 10);
    applyZoom();
    vscode.setState(Object.assign({}, vscode.getState() || {}, { zoomLevel: zoomLevel }));
    vscode.postMessage({ type: 'setZoomLevel', level: zoomLevel });
  });
}
applyZoom();

//  Session sidebar
const sessionList = document.getElementById('session-list');
const newSessionBtn = document.getElementById('new-session-btn');
let activeSessionId = null;

function renderSessions(sessions) {
  if (!sessionList) return;
  sessionList.innerHTML = '';
  for (const s of sessions) {
    const item = document.createElement('div');
    item.className = 'session-item' + (s.id === activeSessionId ? ' active' : '');
    item.dataset.id = s.id;

    const title = document.createElement('span');
    title.className = 'session-title';
    title.textContent = s.title;
    title.title = s.title;

    const del = document.createElement('button');
    del.className = 'session-delete';
    del.textContent = '×';
    del.title = 'Delete session';
    del.addEventListener('click', (e) => {
      e.stopPropagation();
      vscode.postMessage({ type: 'deleteSession', id: s.id });
    });

    item.appendChild(title);
    item.appendChild(del);
    item.addEventListener('click', () => {
      vscode.postMessage({ type: 'loadSession', id: s.id });
    });
    // Double-click title to rename inline
    title.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.value = s.title;
      inp.style.cssText = 'width:100%;background:var(--input-bg);color:var(--input-fg);border:1px solid var(--btn-bg);border-radius:2px;padding:1px 4px;font-size:11px;';
      title.replaceWith(inp);
      inp.focus();
      inp.select();
      const commit = () => {
        const newTitle = inp.value.trim() || s.title;
        if (newTitle !== s.title) vscode.postMessage({ type: 'renameSession', id: s.id, title: newTitle });
        inp.replaceWith(title);
        title.textContent = newTitle;
      };
      inp.addEventListener('blur', commit);
      inp.addEventListener('keydown', (ke) => {
        if (ke.key === 'Enter') { ke.preventDefault(); commit(); }
        if (ke.key === 'Escape') { inp.replaceWith(title); }
      });
    });
    sessionList.appendChild(item);
  }
}

newSessionBtn?.addEventListener('click', () => {
  activeSessionId = null;
  vscode.postMessage({ type: 'newSession' });
});

window.addEventListener('message', (event) => {
  const msg = event.data;
  if (msg.type === 'sessionList') {
    renderSessions(msg.sessions);
  } else if (msg.type === 'sessionCreated') {
    activeSessionId = msg.session.id;
    vscode.setState({ ...(vscode.getState() || {}), activeSessionId });
    vscode.postMessage({ type: 'listSessions' });
  } else if (msg.type === 'sessionLoaded') {
    // Capture scroll position BEFORE we clear the DOM so a repeat
    // sessionLoaded (same id) can land back where the user was. A
    // different session id resets the remembered position.
    const prevScroll = (activeSessionId === msg.id)
      ? _savedScrollByMsgId[_lastFocusedMsgId] ?? null
      : null;
    activeSessionId = msg.id;
    vscode.setState({ ...(vscode.getState() || {}), activeSessionId });
    // Reset stream-tracking state BEFORE the DOM rebuild — otherwise an
    // in-flight chunk addressed to a stale msg-<id> on the prior session
    // would silently drop, or worse, append into a freshly-created
    // homonym element. Clearing the active set + streaming flag makes
    // the transition atomic from the dispatcher's viewpoint.
    streaming = false;
    activeStreams.clear();
    streamTools.length = 0;
    streamBodyMap.clear();
    streamThinkingMap.clear();
    messages.innerHTML = '';
    _resetPruneBanner();
    for (const m of msg.messages) appendMessage(m);
    _enforceMessageDomCap();
    // If we had a remembered scroll offset for this session's last-
    // focused message, scroll there; otherwise land at the bottom.
    if (prevScroll !== null && typeof prevScroll === 'number') {
      messages.scrollTop = prevScroll;
    } else {
      forceScrollToBottom();
    }
    setStatus(`Loaded: ${msg.title}`);
    vscode.postMessage({ type: 'listSessions' });
  } else if (msg.type === 'historyCleared') {
    activeSessionId = null;
    vscode.setState({ ...(vscode.getState() || {}), activeSessionId: null });
    streaming = false;
    activeStreams.clear();
    streamTools.length = 0;
    streamBodyMap.clear();
    streamThinkingMap.clear();
    messages.innerHTML = '';
    _resetPruneBanner();
    setStatus('');
    vscode.postMessage({ type: 'listSessions' });
  }
}, true);

// Load session list on startup
vscode.postMessage({ type: 'listSessions' });

//  HME shim status
const shimStatus = document.getElementById('shim-status');
function checkShim() {
  vscode.postMessage({ type: 'checkHmeShim' });
}
window.addEventListener('message', (event) => {
  if (event.data.type === 'hmeShimStatus') {
    if (shimStatus) {
      shimStatus.textContent = event.data.ready ? 'HME ●' : event.data.failed ? 'HME ✗' : 'HME ○';
      shimStatus.style.color = event.data.ready ? 'var(--route-hybrid)' : event.data.failed ? 'var(--error-fg)' : 'var(--subtle)';
      shimStatus.title = event.data.ready ? 'HME KB shim: ready' : event.data.failed ? 'HME KB shim: FAILED — see chat for error' : 'HME KB shim: starting…';
    }
  } else if (event.data.type === 'arbiterHealth') {
    const arb = document.getElementById('arbiter-status');
    if (arb) {
      const healthy = event.data.healthy;
      const fails = event.data.consecutiveFailures || 0;
      arb.textContent = healthy ? 'ARB ●' : 'ARB ✗';
      arb.style.color = healthy ? 'var(--route-hybrid)' : 'var(--error-fg)';
      arb.title = healthy
        ? 'Auto-routing arbiter: healthy (last ok ' + (event.data.lastOkMs ? new Date(event.data.lastOkMs).toISOString().slice(11,19) : 'never') + ')'
        : 'Auto-routing arbiter: UNHEALTHY (' + fails + ' consecutive failures) — route=auto falls back to claude';
    }
  }
}, true);
checkShim();
// Poll arbiter health every 30s. Lightweight — the endpoint just
// reads in-memory state on the server side.
function checkArbiterHealth() { vscode.postMessage({ type: 'checkArbiterHealth' }); }
setInterval(checkArbiterHealth, 30_000);
setTimeout(checkArbiterHealth, 2_000);
</script>
